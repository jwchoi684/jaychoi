<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 휴가 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #f8f9fb;
    --border: #e5e7eb;
    --border2: #d1d5db;
    --text: #111827;
    --text2: #6b7280;
    --text3: #9ca3af;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --accent-hover: #1d4ed8;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --red: #dc2626;
    --red-light: #fef2f2;
    --orange: #ea580c;
    --orange-light: #fff7ed;
    --purple: #7c3aed;
    --purple-light: #f5f3ff;
    --yellow: #ca8a04;
    --yellow-light: #fefce8;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,.1), 0 4px 10px rgba(0,0,0,.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Layout ── */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
  }

  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 16px;
  }
  .logo-text { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
  .logo-sub { font-size: 11px; color: var(--text3); }

  nav { padding: 12px 10px; flex: 1; }
  .nav-section { margin-bottom: 20px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; padding: 4px 10px 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text2);
    font-size: 13.5px;
    font-weight: 500;
    transition: all .15s;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent); }
  .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
  .badge {
    margin-left: auto;
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 20px;
    min-width: 18px;
    text-align: center;
  }

  .main { margin-left: 220px; flex: 1; min-height: 100vh; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex; align-items: center;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 700;
    cursor: pointer;
  }

  .page { padding: 28px 32px; display: none; }
  .page.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .card-title { font-size: 15px; font-weight: 700; letter-spacing: -.2px; }
  .card-body { padding: 24px; }

  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 13px; font-weight: 600; color: var(--text); }
  input, select, textarea {
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 13px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color .15s, box-shadow .15s;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  }
  textarea { resize: vertical; min-height: 80px; }
  .hint { font-size: 12px; color: var(--text3); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--border); }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* ── Tags ── */
  .tag {
    display: inline-flex; align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .tag-연차 { background: var(--accent-light); color: var(--accent); }
  .tag-반차 { background: var(--purple-light); color: var(--purple); }
  .tag-병가 { background: var(--orange-light); color: var(--orange); }
  .tag-approved { background: var(--green-light); color: var(--green); }
  .tag-rejected { background: var(--red-light); color: var(--red); }
  .tag-pending { background: var(--yellow-light); color: var(--yellow); }

  /* ── Stats ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }

  /* ── Calendar ── */
  .cal-nav {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  .cal-month { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
  .cal-nav-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .15s;
  }
  .cal-nav-btn:hover { background: var(--surface2); }
  .cal-legend { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .cal-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .cal-day-header {
    text-align: center;
    padding: 10px 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
  }
  .cal-day-header:first-child { color: #ef4444; }
  .cal-day-header:last-child { color: var(--accent); }
  .cal-cell {
    min-height: 100px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px;
    position: relative;
    transition: background .15s;
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.other-month .cal-date { color: var(--text3); }
  .cal-cell.today { background: #eff6ff; }
  .cal-cell.today .cal-date {
    background: var(--accent);
    color: #fff;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .cal-date { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .cal-event {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity .15s;
  }
  .cal-event:hover { opacity: .8; }
  .cal-event.연차 { background: #dbeafe; color: #1d4ed8; }
  .cal-event.반차 { background: #ede9fe; color: #6d28d9; }
  .cal-event.병가 { background: #ffedd5; color: #c2410c; }
  .cal-sun .cal-date { color: #ef4444; }
  .cal-sat .cal-date { color: var(--accent); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 11px 16px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .5px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    white-space: nowrap;
  }
  td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  /* ── Member summary ── */
  .member-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }
  .member-row:last-child { border-bottom: none; }
  .member-row:hover { background: var(--surface2); }
  .member-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .member-name { font-size: 14px; font-weight: 600; width: 80px; flex-shrink: 0; }
  .member-bars { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { font-size: 11px; color: var(--text3); width: 20px; }
  .bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .member-counts { display: flex; flex-direction: column; gap: 4px; width: 80px; }
  .count-item { font-size: 12px; }
  .count-num { font-weight: 700; }

  /* ── Toast ── */
  .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--text);
    color: #fff;
    padding: 12px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    animation: slideUp .2s ease-out;
    max-width: 300px;
  }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    backdrop-filter: blur(2px);
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    width: 440px; max-width: 90vw;
    animation: popIn .2s ease-out;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .modal-header {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; padding: 2px; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  .detail-row { display: flex; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 12px; font-weight: 600; color: var(--text3); width: 80px; flex-shrink: 0; padding-top: 1px; }
  .detail-value { font-size: 14px; color: var(--text); }

  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--text3);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .page { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <div class="logo-icon">🗓</div>
        <div>
          <div class="logo-text">LeaveHub</div>
          <div class="logo-sub">팀 휴가 관리</div>
        </div>
      </div>
    </div>
    <nav>
      <div class="nav-section">
        <div class="nav-label">메뉴</div>
        <div class="nav-item active" onclick="showPage('apply')">
          <span class="icon">✏️</span> 휴가 신청
        </div>
        <div class="nav-item" onclick="showPage('calendar')">
          <span class="icon">📅</span> 휴가 달력
        </div>
        <div class="nav-item" onclick="showPage('admin')">
          <span class="icon">⚙️</span> 관리자 화면
          <span class="badge" id="pendingBadge">0</span>
        </div>
        <div class="nav-item" onclick="showPage('summary')">
          <span class="icon">📊</span> 이번달 요약
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Topbar -->
    <div class="topbar">
      <h1 id="pageTitle">휴가 신청</h1>
      <div class="topbar-actions">
        <span style="font-size:12px;color:var(--text3);" id="todayDate"></span>
        <button class="btn btn-secondary btn-sm" onclick="onRefresh()" title="새로고침">🔄</button>
        <div class="avatar" title="관리자">관</div>
      </div>
    </div>
    <div id="loadingBar" style="display:none;height:3px;background:linear-gradient(90deg,var(--accent),#60a5fa,var(--accent));background-size:200%;animation:shimmer 1.2s infinite;"></div>

    <!-- Page: Apply -->
    <div class="page active" id="page-apply">
      <div style="max-width:600px;">
        <div class="card">
          <div class="card-header">
            <span style="font-size:18px;">✏️</span>
            <span class="card-title">새 휴가 신청</span>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="form-group form-full">
                <label for="emp-name">신청자 이름</label>
                <input type="text" id="emp-name" placeholder="이름을 입력하세요">
              </div>
              <div class="form-group">
                <label for="leave-type">휴가 종류</label>
                <select id="leave-type">
                  <option value="연차">🏖️ 연차</option>
                  <option value="반차">🌤️ 반차</option>
                  <option value="병가">🏥 병가</option>
                </select>
              </div>
              <div class="form-group" id="halfday-period-group" style="display:none;">
                <label for="halfday-period">반차 구분</label>
                <select id="halfday-period">
                  <option value="오전">오전 반차</option>
                  <option value="오후">오후 반차</option>
                </select>
              </div>
              <div class="form-group">
                <label for="start-date">시작일</label>
                <input type="date" id="start-date">
              </div>
              <div class="form-group" id="end-date-group">
                <label for="end-date">종료일</label>
                <input type="date" id="end-date">
              </div>
              <div class="form-group form-full">
                <label for="reason">사유 <span style="font-weight:400;color:var(--text3)">(선택)</span></label>
                <textarea id="reason" placeholder="휴가 사유를 간략히 입력하세요..."></textarea>
              </div>
            </div>
            <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end;">
              <button class="btn btn-secondary" onclick="resetForm()">초기화</button>
              <button class="btn btn-primary" onclick="submitLeave()">
                ✉️ 신청하기
              </button>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:20px;" id="myLeavesCard">
          <div class="card-header">
            <span style="font-size:18px;">📋</span>
            <span class="card-title">내 신청 내역</span>
          </div>
          <div id="myLeavesBody"></div>
        </div>
      </div>
    </div>

    <!-- Page: Calendar -->
    <div class="page" id="page-calendar">
      <div class="card">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="moveMonth(-1)">‹</button>
          <span class="cal-month" id="calMonth"></span>
          <button class="cal-nav-btn" onclick="moveMonth(1)">›</button>
          <div class="cal-legend">
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#3b82f6;"></div>연차</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#8b5cf6;"></div>반차</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f97316;"></div>병가</div>
          </div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <!-- Page: Admin -->
    <div class="page" id="page-admin">
      <div class="card">
        <div class="card-header">
          <span style="font-size:18px;">⚙️</span>
          <span class="card-title">승인 관리</span>
          <span style="margin-left:auto;font-size:12px;color:var(--text3);">대기 중인 신청을 처리하세요</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>신청자</th>
                <th>휴가 종류</th>
                <th>기간</th>
                <th>사유</th>
                <th>신청일</th>
                <th>상태</th>
                <th>처리</th>
              </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Page: Summary -->
    <div class="page" id="page-summary">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="card">
        <div class="card-header">
          <span style="font-size:18px;">👥</span>
          <span class="card-title">팀원별 휴가 현황</span>
          <span style="margin-left:auto;font-size:12px;color:var(--text3)" id="summaryMonth"></span>
        </div>
        <div id="memberSummaryBody"></div>
      </div>
    </div>
  </main>
</div>

<!-- Modal: Detail -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">휴가 상세</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ─── Constants ───────────────────────────────────────
const KO_MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const KO_DAYS = ['일','월','화','수','목','금','토'];

// ─── ⚙️ Google Apps Script URL 설정 ──────────────────
// 3단계에서 복사한 웹앱 URL을 아래에 붙여넣으세요
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyoHTDURqlD6rXpnrr0DvK8fixeeX7FXJNPEFRDEs5axir5t12IgaGVoAl-9YKr04yC_w/exec';

// ─── State ───────────────────────────────────────────
let leaves = [];
let calYear, calMonth;

const MEMBER_COLORS = ['#2563eb','#7c3aed','#16a34a','#ea580c','#dc2626','#0891b2','#d97706'];
const memberColorMap = {};

function getMemberColor(name) {
  if (!memberColorMap[name]) {
    const keys = Object.keys(memberColorMap);
    memberColorMap[name] = MEMBER_COLORS[keys.length % MEMBER_COLORS.length];
  }
  return memberColorMap[name];
}

// ─── API ─────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loadingBar').style.display = on ? 'block' : 'none';
}

async function apiGet() {
  const res = await fetch(`${SCRIPT_URL}?action=getAll`);
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

async function apiAdd(leave) {
  await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'add', leave })
  });
}

async function apiUpdate(id, status) {
  await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'update', id, status })
  });
}

async function refreshLeaves() {
  setLoading(true);
  try {
    leaves = await apiGet();
  } catch(e) {
    toast('데이터를 불러오지 못했습니다. URL을 확인하세요.', 'error');
  }
  setLoading(false);
  updateBadge();
}

function updateBadge() {
  const pending = leaves.filter(l => l.status === 'pending').length;
  document.getElementById('pendingBadge').textContent = pending;
  document.getElementById('pendingBadge').style.display = pending ? '' : 'none';
}

// ─── Init ────────────────────────────────────────────
(async function init() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

  const d = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  document.getElementById('todayDate').textContent = d;

  // Set default dates
  const today = now.toISOString().split('T')[0];
  document.getElementById('start-date').value = today;
  document.getElementById('end-date').value = today;

  if (SCRIPT_URL === '여기에_URL_붙여넣기') {
    toast('⚠️ SCRIPT_URL을 설정해주세요.', 'error');
    return;
  }

  await refreshLeaves();

  document.getElementById('leave-type').addEventListener('change', function() {
    const isHalf = this.value === '반차';
    document.getElementById('halfday-period-group').style.display = isHalf ? '' : 'none';
    document.getElementById('end-date-group').style.display = isHalf ? 'none' : '';
    if (isHalf) {
      const s = document.getElementById('start-date').value;
      document.getElementById('end-date').value = s;
    }
  });
  document.getElementById('start-date').addEventListener('change', function() {
    if (document.getElementById('leave-type').value === '반차') return;
    if (document.getElementById('end-date').value < this.value)
      document.getElementById('end-date').value = this.value;
  });

  updateBadge();
  renderMyLeaves();
  renderCalendar();
  renderAdmin();
  renderSummary();
})();

async function onRefresh() {
  await refreshLeaves();
  renderMyLeaves();
  renderCalendar();
  renderAdmin();
  renderSummary();
  toast('새로고침 완료', 'success');
}

// ─── Navigation ──────────────────────────────────────
const PAGE_TITLES = { apply:'휴가 신청', calendar:'휴가 달력', admin:'관리자 화면', summary:'이번달 요약' };

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    if (n.getAttribute('onclick')?.includes(id)) n.classList.add('active');
  });
  document.getElementById('pageTitle').textContent = PAGE_TITLES[id];
  if (id === 'calendar') renderCalendar();
  if (id === 'admin') renderAdmin();
  if (id === 'summary') renderSummary();
}

// ─── Apply Page ──────────────────────────────────────
async function submitLeave() {
  const name = document.getElementById('emp-name').value.trim();
  const type = document.getElementById('leave-type').value;
  const start = document.getElementById('start-date').value;
  const end = type === '반차' ? start : document.getElementById('end-date').value;
  const reason = document.getElementById('reason').value.trim();
  const halfday = type === '반차' ? document.getElementById('halfday-period').value : null;

  if (!name) { toast('이름을 입력해주세요.', 'error'); return; }
  if (!start) { toast('날짜를 선택해주세요.', 'error'); return; }
  if (start > end) { toast('종료일이 시작일보다 빠릅니다.', 'error'); return; }

  const id = Date.now();
  const today = new Date().toISOString().split('T')[0];
  const leave = { id, name, type, start, end, reason, status: 'pending', createdAt: today, halfday };

  setLoading(true);
  try {
    await apiAdd(leave);
    await refreshLeaves();
    renderMyLeaves();
    renderAdmin();
    toast('✅ 휴가 신청이 완료되었습니다. 승인을 기다려주세요.', 'success');
  } catch(e) {
    toast('신청 중 오류가 발생했습니다.', 'error');
  }
  setLoading(false);
}

function resetForm() {
  document.getElementById('emp-name').value = '';
  document.getElementById('reason').value = '';
  document.getElementById('leave-type').value = '연차';
  document.getElementById('halfday-period-group').style.display = 'none';
  document.getElementById('end-date-group').style.display = '';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('start-date').value = today;
  document.getElementById('end-date').value = today;
}

function renderMyLeaves() {
  const body = document.getElementById('myLeavesBody');
  const name = document.getElementById('emp-name').value.trim();
  let list = name ? leaves.filter(l => l.name === name) : leaves;
  list = [...list].reverse().slice(0, 10);

  if (!list.length) {
    body.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">신청 내역이 없습니다</div></div>`;
    return;
  }

  body.innerHTML = `<table style="width:100%">
    <thead><tr>
      <th>이름</th><th>종류</th><th>기간</th><th>상태</th><th></th>
    </tr></thead>
    <tbody>
    ${list.map(l => `
      <tr>
        <td><b>${l.name}</b></td>
        <td><span class="tag tag-${l.type}">${l.type}${l.halfday ? ' ('+l.halfday+')' : ''}</span></td>
        <td style="color:var(--text2)">${formatDate(l.start)}${l.start!==l.end?' ~ '+formatDate(l.end):''}</td>
        <td>${statusTag(l.status)}</td>
        <td><button class="btn btn-secondary btn-sm" onclick="openDetail(${l.id})">상세</button></td>
      </tr>
    `).join('')}
    </tbody>
  </table>`;
}

// ─── Calendar Page ───────────────────────────────────

function moveMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonth').textContent = `${calYear}년 ${KO_MONTHS[calMonth]}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day headers
  KO_DAYS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-day-header';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();

  const getEvents = date => leaves.filter(l => {
    if (l.status === 'rejected') return false;
    const d = date.toISOString().split('T')[0];
    return d >= l.start && d <= l.end;
  });

  // Blanks
  for (let i = 0; i < firstDay; i++) {
    const prev = new Date(calYear, calMonth, -firstDay + i + 1);
    const cell = makeCell(prev, true, getEvents(prev));
    grid.appendChild(cell);
  }

  // Days
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calYear, calMonth, d);
    const isToday = date.toDateString() === today.toDateString();
    const cell = makeCell(date, false, getEvents(date), isToday);
    grid.appendChild(cell);
  }

  // Trailing
  const total = firstDay + daysInMonth;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= trailing; i++) {
    const date = new Date(calYear, calMonth + 1, i);
    const cell = makeCell(date, true, getEvents(date));
    grid.appendChild(cell);
  }
}

function makeCell(date, otherMonth, events, isToday) {
  const cell = document.createElement('div');
  const dow = date.getDay();
  cell.className = 'cal-cell' + (otherMonth ? ' other-month' : '') + (isToday ? ' today' : '') + (dow === 0 ? ' cal-sun' : '') + (dow === 6 ? ' cal-sat' : '');

  const dateEl = document.createElement('div');
  dateEl.className = 'cal-date';
  dateEl.textContent = date.getDate();
  cell.appendChild(dateEl);

  events.slice(0, 3).forEach(ev => {
    const el = document.createElement('div');
    el.className = `cal-event ${ev.type}`;
    el.textContent = `${ev.name} ${ev.type}`;
    el.title = `${ev.name} - ${ev.type}`;
    el.onclick = () => openDetail(ev.id);
    cell.appendChild(el);
  });
  if (events.length > 3) {
    const el = document.createElement('div');
    el.style.cssText = 'font-size:11px;color:var(--text3);padding:2px 6px;';
    el.textContent = `+${events.length - 3}명 더`;
    cell.appendChild(el);
  }
  return cell;
}

// ─── Admin Page ──────────────────────────────────────
function renderAdmin() {
  const tbody = document.getElementById('adminTableBody');
  const sorted = [...leaves].sort((a, b) => {
    const order = { pending: 0, approved: 1, rejected: 2 };
    return order[a.status] - order[b.status] || b.id - a.id;
  });

  if (!sorted.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">📭</div><div class="empty-text">신청 내역이 없습니다</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = sorted.map(l => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="member-avatar" style="width:30px;height:30px;font-size:12px;background:${getMemberColor(l.name)}">${l.name[0]}</div>
          <b>${l.name}</b>
        </div>
      </td>
      <td><span class="tag tag-${l.type}">${l.type}${l.halfday ? ' ('+l.halfday+')' : ''}</span></td>
      <td style="color:var(--text2);font-size:13px;">${formatDate(l.start)}${l.start!==l.end?' ~<br>'+formatDate(l.end):''}</td>
      <td style="color:var(--text2);max-width:160px;font-size:12px;">${l.reason || '<span style="color:var(--text3)">-</span>'}</td>
      <td style="color:var(--text3);font-size:12px;">${l.createdAt}</td>
      <td>${statusTag(l.status)}</td>
      <td>
        ${l.status === 'pending' ? `
          <div style="display:flex;gap:5px;">
            <button class="btn btn-success btn-sm" onclick="adminAction(${l.id},'approved')">✓ 승인</button>
            <button class="btn btn-danger btn-sm" onclick="adminAction(${l.id},'rejected')">✕ 거절</button>
          </div>
        ` : `<span style="font-size:12px;color:var(--text3)">처리 완료</span>`}
      </td>
    </tr>
  `).join('');
}

async function adminAction(id, status) {
  const leave = leaves.find(l => String(l.id) === String(id));
  if (!leave) return;
  setLoading(true);
  try {
    await apiUpdate(id, status);
    await refreshLeaves();
    renderAdmin();
    renderCalendar();
    renderSummary();
    const msg = status === 'approved' ? `✅ ${leave.name}님의 휴가를 승인했습니다.` : `❌ ${leave.name}님의 휴가를 거절했습니다.`;
    toast(msg, status === 'approved' ? 'success' : 'error');
  } catch(e) {
    toast('처리 중 오류가 발생했습니다.', 'error');
  }
  setLoading(false);
}

// ─── Summary Page ────────────────────────────────────
function renderSummary() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const monthStr = `${y}-${String(m+1).padStart(2,'0')}`;
  document.getElementById('summaryMonth').textContent = `${y}년 ${KO_MONTHS[m]} 기준`;

  const thisMonth = leaves.filter(l => l.start.startsWith(monthStr));
  const approved = thisMonth.filter(l => l.status === 'approved');
  const pending = thisMonth.filter(l => l.status === 'pending');

  // Stats
  const totalDays = approved.reduce((acc, l) => acc + calcDays(l), 0);
  const members = [...new Set(thisMonth.map(l => l.name))].length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">이번달 총 신청</div>
      <div class="stat-value" style="color:var(--accent)">${thisMonth.length}</div>
      <div class="stat-sub">건</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">승인된 휴가일수</div>
      <div class="stat-value" style="color:var(--green)">${totalDays}</div>
      <div class="stat-sub">일</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">대기 중</div>
      <div class="stat-value" style="color:var(--yellow)">${pending.length}</div>
      <div class="stat-sub">건</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">신청 팀원 수</div>
      <div class="stat-value">${members}</div>
      <div class="stat-sub">명</div>
    </div>
  `;

  // Member breakdown
  const memberData = {};
  approved.forEach(l => {
    if (!memberData[l.name]) memberData[l.name] = { 연차: 0, 반차: 0, 병가: 0 };
    const key = l.type;
    memberData[l.name][key] = (memberData[l.name][key] || 0) + calcDays(l);
  });

  const allNames = [...new Set(thisMonth.map(l => l.name))];
  allNames.forEach(n => { if (!memberData[n]) memberData[n] = { 연차: 0, 반차: 0, 병가: 0 }; });

  const maxDays = Math.max(...Object.values(memberData).map(v => v.연차 + v.반차 + v.병가), 1);
  const body = document.getElementById('memberSummaryBody');

  if (!allNames.length) {
    body.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">이번달 신청 내역이 없습니다</div></div>`;
    return;
  }

  body.innerHTML = allNames.map(name => {
    const d = memberData[name];
    const total = d.연차 + d.반차 + d.병가;
    const color = getMemberColor(name);
    return `
    <div class="member-row">
      <div class="member-avatar" style="background:${color}">${name[0]}</div>
      <div class="member-name">${name}</div>
      <div class="member-bars">
        ${d.연차 > 0 ? `<div class="bar-row"><div class="bar-label" style="color:#2563eb">연차</div><div class="bar-track"><div class="bar-fill" style="width:${(d.연차/maxDays)*100}%;background:#3b82f6"></div></div></div>` : ''}
        ${d.반차 > 0 ? `<div class="bar-row"><div class="bar-label" style="color:#7c3aed">반차</div><div class="bar-track"><div class="bar-fill" style="width:${(d.반차/maxDays)*100}%;background:#8b5cf6"></div></div></div>` : ''}
        ${d.병가 > 0 ? `<div class="bar-row"><div class="bar-label" style="color:#ea580c">병가</div><div class="bar-track"><div class="bar-fill" style="width:${(d.병가/maxDays)*100}%;background:#f97316"></div></div></div>` : ''}
        ${total === 0 ? `<div style="font-size:12px;color:var(--text3)">승인된 휴가 없음</div>` : ''}
      </div>
      <div class="member-counts">
        ${d.연차 > 0 ? `<div class="count-item"><span style="color:#2563eb;font-size:10px;">●</span> 연차 <span class="count-num">${d.연차}일</span></div>` : ''}
        ${d.반차 > 0 ? `<div class="count-item"><span style="color:#7c3aed;font-size:10px;">●</span> 반차 <span class="count-num">${d.반차}회</span></div>` : ''}
        ${d.병가 > 0 ? `<div class="count-item"><span style="color:#ea580c;font-size:10px;">●</span> 병가 <span class="count-num">${d.병가}일</span></div>` : ''}
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-top:2px;">총 ${total}일</div>
      </div>
    </div>`;
  }).join('');
}

// ─── Detail Modal ────────────────────────────────────
function openDetail(id) {
  const l = leaves.find(x => x.id === id);
  if (!l) return;
  const body = document.getElementById('detailModalBody');
  body.innerHTML = `
    <div class="detail-row"><div class="detail-label">신청자</div><div class="detail-value"><b>${l.name}</b></div></div>
    <div class="detail-row"><div class="detail-label">휴가 종류</div><div class="detail-value"><span class="tag tag-${l.type}">${l.type}${l.halfday ? ' ('+l.halfday+')' : ''}</span></div></div>
    <div class="detail-row"><div class="detail-label">기간</div><div class="detail-value">${l.start === l.end ? formatDate(l.start) : formatDate(l.start) + ' ~ ' + formatDate(l.end)} (${calcDays(l)}일)</div></div>
    <div class="detail-row"><div class="detail-label">사유</div><div class="detail-value">${l.reason || '<span style="color:var(--text3)">없음</span>'}</div></div>
    <div class="detail-row"><div class="detail-label">신청일</div><div class="detail-value">${l.createdAt}</div></div>
    <div class="detail-row"><div class="detail-label">상태</div><div class="detail-value">${statusTag(l.status)}</div></div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('detailOverlay').classList.remove('open');
}
document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── Helpers ─────────────────────────────────────────
function calcDays(l) {
  if (l.type === '반차') return 0.5;
  const start = new Date(l.start);
  const end = new Date(l.end);
  let count = 0;
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return count;
}

function formatDate(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  return `${parseInt(m)}월 ${parseInt(d)}일`;
}

function statusTag(s) {
  const map = { pending: ['pending', '대기 중'], approved: ['approved', '승인됨'], rejected: ['rejected', '거절됨'] };
  const [cls, label] = map[s] || ['pending', s];
  return `<span class="tag tag-${cls}">${label}</span>`;
}

function toast(msg, type = '') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
</script>
</body>
</html>
